  <div id="root"></div>

  <!--
  ═══════════════════════════════════════════════════════════
  HOW TO EDIT THIS FILE
  ═══════════════════════════════════════════════════════════

  TEXT & TRANSLATIONS
  All text lives in the T = { en: {...}, es: {...} } object.
  Find a key (e.g. hero_title) and change its value.
  To add a third language (e.g. French), add a `fr: {...}` block
  and update the lang toggle button logic.

  NEUROMINDY LINK
  Search for "hellomindy.mindycore.com" to find all instances.

  MINDYPLAY — REPLACING "COMING SOON" WITH REAL STORE LINKS
  Search for "play_note" in the translations and update the text.
  In the Labs section, find the <div> with "play_note" and replace
  it with two <a> buttons linking to the App Store and Google Play.

  SOCIAL / COMMUNITY LINKS
  Search for "comm_discord" and "comm_reddit" in the JSX —
  replace the <span> with an <a href="YOUR_LINK"> element.

  NEWSLETTER
  The form currently shows a success message on submit.
  To connect to Mailchimp/ConvertKit/etc., replace the onSubmit
  handler with a fetch() POST to your email provider's API.

  ADDING A NEW SECTION
  1. Add translations to T.en and T.es
  2. Add the section ID to the SECTIONS array
  3. Add a <Section> block in the JSX main area
  4. Add a key in the expanded state object

  PERFORMANCE NOTE
  This file uses Babel standalone (loads + compiles in-browser).
  For production, run: npm create vite@latest && npm run build
  Drop the resulting /dist folder on Netlify for a fast, optimised site.
  ═══════════════════════════════════════════════════════════
  -->

  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────────────────────────────────────
// GLOBAL STYLES
// ─────────────────────────────────────────────────────────────────────────────
const GLOBAL_CSS = `
@import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Lexend+Deca:wght@300;400;500;600;700&family=Comic+Neue:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

#mc-root {
  --bg:       #F5F2EB;
  --bg2:      #EDE9DF;
  --surface:  #FFFFFF;
  --primary:  #1A5244;
  --pri-lt:   #2D7060;
  --accent:   #52A882;
  --cta:      #D4611A;
  --cta-h:    #B8531A;
  --txt:      #1C2820;
  --muted:    #5D6E66;
  --border:   #D6D1C8;
  --shad:     0 2px 16px rgba(26,82,68,.09);
  --shad-lg:  0 8px 32px rgba(26,82,68,.12);
  --r:        12px;
  --r-lg:     20px;
  --tr:       .24s ease;
  --font-b:   'Atkinson Hyperlegible', Georgia, serif;
  --font-h:   'Lexend Deca', system-ui, sans-serif;
  --fz:       1rem;
  background: var(--bg);
  color: var(--txt);
  font-family: var(--font-b);
  font-size: var(--fz);
  line-height: 1.7;
  min-height: 100vh;
  transition: background var(--tr), color var(--tr);
}

#mc-root[data-theme="dark"] {
  --bg:      #0D1A14;
  --bg2:     #142019;
  --surface: #1A2E24;
  --primary: #5EC9A2;
  --pri-lt:  #7EDBB8;
  --accent:  #3D9470;
  --cta:     #E07840;
  --cta-h:   #C86830;
  --txt:     #E4F2EC;
  --muted:   #7AA090;
  --border:  #263D32;
  --shad:    0 2px 16px rgba(0,0,0,.3);
  --shad-lg: 0 8px 32px rgba(0,0,0,.4);
}

#mc-root[data-fz="large"]  { --fz: 1.15rem; }
#mc-root[data-fz="xlarge"] { --fz: 1.3rem;  }

#mc-root[data-dys="true"] {
  --font-b: 'Comic Neue', 'Comic Sans MS', cursive;
  letter-spacing: .04em;
  word-spacing: .12em;
  line-height: 1.9;
}

#mc-root[data-motion="true"] *,
#mc-root[data-motion="true"] *::before,
#mc-root[data-motion="true"] *::after {
  animation-duration: .01ms !important;
  transition-duration: .01ms !important;
}

#mc-root[data-calm="true"] .deco { display: none !important; }

h1,h2,h3,h4 { font-family: var(--font-h); line-height: 1.25; color: var(--txt); }
h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight:700; }
h2 { font-size: clamp(1.45rem,3.5vw,2.1rem); font-weight:600; }
h3 { font-size: clamp(1.05rem,2vw,1.35rem); font-weight:600; }
h4 { font-size: 1rem; font-weight:600; }

a { color: var(--primary); }
a:hover { color: var(--pri-lt); }
:focus-visible { outline: 3px solid var(--cta); outline-offset:3px; border-radius:4px; }

section { scroll-margin-top: 76px; }

/* Progress bar */
.mc-progress {
  position: fixed; top:0; left:0; height:4px; z-index:200;
  background: linear-gradient(90deg, var(--accent), var(--cta));
  transition: width .1s linear;
  border-radius:0 2px 2px 0;
}

/* Nav */
.mc-nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  background: rgba(245,242,235,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: background var(--tr), border-color var(--tr);
}
#mc-root[data-theme="dark"] .mc-nav {
  background: rgba(13,26,20,.92);
}
.mc-nav-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items:center; gap:.5rem;
  padding: .75rem 1.25rem;
  flex-wrap: wrap;
}
.mc-logo {
  display:flex; align-items:center; gap:.5rem;
  font-family: var(--font-h); font-weight:700; font-size:1.1rem;
  color: var(--primary); text-decoration:none; flex-shrink:0;
}
.mc-logo svg { flex-shrink:0; }
.mc-nav-links {
  display:flex; align-items:center; gap:.1rem;
  flex-wrap:wrap; flex:1; overflow:hidden;
}
.mc-nav-link {
  font-family: var(--font-h); font-size:.82rem; font-weight:500;
  color: var(--muted); background:none; border:none;
  padding:.35rem .6rem; border-radius:6px; cursor:pointer;
  transition: color var(--tr), background var(--tr);
  white-space:nowrap;
}
.mc-nav-link:hover { color: var(--txt); background: var(--bg2); }
.mc-nav-link.active { color: var(--primary); font-weight:600; }
.mc-nav-actions {
  display:flex; align-items:center; gap:.4rem; flex-shrink:0;
}
.mc-icon-btn {
  width:36px; height:36px; border-radius:8px; border:1px solid var(--border);
  background: var(--surface); color: var(--txt);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition: all var(--tr); flex-shrink:0;
}
.mc-icon-btn:hover { background: var(--bg2); border-color: var(--accent); }
.mc-lang-btn {
  font-family: var(--font-h); font-size:.8rem; font-weight:600;
  padding: 0 .75rem; border-radius:8px; border:1px solid var(--border);
  background: var(--surface); color: var(--primary); cursor:pointer;
  height:36px; transition: all var(--tr);
}
.mc-lang-btn:hover { background: var(--bg2); }

/* Page layout */
.mc-main { padding-top: 80px; }

/* Container */
.mc-container { max-width:1100px; margin:0 auto; padding:0 1.25rem; }
.mc-container-sm { max-width:760px; margin:0 auto; padding:0 1.25rem; }

/* Section wrapper */
.mc-section {
  padding: 4rem 0;
  border-bottom: 1px solid var(--border);
}
.mc-section:nth-child(even) { background: var(--bg2); }
.mc-section-head {
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:1rem; margin-bottom:1rem;
}
.mc-section-toggle {
  background:none; border:1px solid var(--border); border-radius:8px;
  color: var(--muted); cursor:pointer; padding:.3rem .6rem;
  font-size:.8rem; font-family: var(--font-h);
  transition: all var(--tr); flex-shrink:0; margin-top:.25rem;
}
.mc-section-toggle:hover { border-color: var(--accent); color: var(--primary); }
.mc-section-body {
  overflow:hidden;
  transition: max-height .4s ease, opacity .4s ease;
}
.mc-section-sub {
  font-size:1.05rem; color: var(--muted); margin-bottom:2rem;
  max-width:58ch;
}

/* Hero */
.mc-hero {
  min-height: calc(100vh - 80px);
  display:flex; align-items:center;
  padding: 4rem 0;
  position:relative; overflow:hidden;
}
.mc-hero-content { position:relative; z-index:1; max-width:680px; }
.mc-hero-tag {
  display:inline-flex; align-items:center; gap:.5rem;
  background: var(--surface); border:1px solid var(--border);
  border-radius:100px; padding:.3rem 1rem;
  font-family: var(--font-h); font-size:.82rem; font-weight:500;
  color: var(--primary); margin-bottom:1.5rem;
}
.mc-hero-title { margin-bottom:1.25rem; white-space:pre-line; }
.mc-hero-sub {
  font-size:1.15rem; color: var(--muted);
  max-width:55ch; margin-bottom:2.25rem; line-height:1.75;
}
.mc-hero-ctas { display:flex; flex-wrap:wrap; gap:1rem; align-items:center; }
.mc-btn-primary {
  background: var(--primary); color:#fff;
  font-family: var(--font-h); font-weight:600; font-size:.95rem;
  padding:.75rem 1.75rem; border-radius:var(--r); border:none;
  cursor:pointer; text-decoration:none;
  transition: background var(--tr), transform .15s;
  display:inline-flex; align-items:center; gap:.5rem;
}
.mc-btn-primary:hover { background: var(--pri-lt); transform:translateY(-1px); color:#fff; }
.mc-btn-ext {
  background: var(--surface); color: var(--primary);
  font-family: var(--font-h); font-weight:600; font-size:.95rem;
  padding:.75rem 1.75rem; border-radius:var(--r);
  border:1.5px solid var(--primary); cursor:pointer; text-decoration:none;
  transition: all var(--tr);
  display:inline-flex; align-items:center; gap:.5rem;
}
.mc-btn-ext:hover { background: var(--bg2); transform:translateY(-1px); color: var(--primary); }
.mc-ext-badge {
  font-size:.72rem; color: var(--muted); font-family: var(--font-h);
  font-weight:400; display:block; margin-top:.25rem;
}

/* Hero decoration */
.mc-hero-deco {
  position:absolute; right:-80px; top:50%; transform:translateY(-50%);
  width:min(520px,55vw); height:min(520px,55vw); z-index:0;
  opacity:.07;
}
#mc-root[data-theme="dark"] .mc-hero-deco { opacity:.06; }

/* Cards */
.mc-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
.mc-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1.25rem; }
@media(max-width:720px) { .mc-grid-2,.mc-grid-3 { grid-template-columns:1fr; } }

.mc-card {
  background: var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:1.75rem;
  box-shadow: var(--shad);
  transition: border-color var(--tr), box-shadow var(--tr);
}
.mc-card:hover { border-color: var(--accent); box-shadow: var(--shad-lg); }
.mc-card-accent { border-left: 4px solid var(--accent); }

/* Value pillars */
.mc-pillar { display:flex; flex-direction:column; gap:.75rem; }
.mc-pillar-icon {
  width:44px; height:44px; border-radius:10px;
  background: var(--bg2); display:flex; align-items:center; justify-content:center;
  color: var(--primary);
}

/* Lab cards */
.mc-lab {
  background: var(--surface); border:1.5px solid var(--border);
  border-radius:var(--r-lg); padding:2rem;
  box-shadow: var(--shad); position:relative; overflow:hidden;
}
.mc-lab-minds { border-top:4px solid var(--accent); }
.mc-lab-play  { border-top:4px solid var(--cta); }
.mc-coming-badge {
  display:inline-block; background: var(--cta); color:#fff;
  font-family: var(--font-h); font-size:.75rem; font-weight:700;
  padding:.25rem .75rem; border-radius:100px; letter-spacing:.04em;
  margin-bottom:.75rem;
}
.mc-feature-list { list-style:none; display:flex; flex-direction:column; gap:.6rem; margin-top:1rem; }
.mc-feature-list li { display:flex; align-items:flex-start; gap:.6rem; font-size:.95rem; }
.mc-check { color: var(--accent); flex-shrink:0; margin-top:.15rem; }

/* Steps */
.mc-steps { display:flex; flex-direction:column; gap:1.25rem; }
.mc-step {
  display:flex; gap:1.25rem; align-items:flex-start;
  background: var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:1.5rem; box-shadow: var(--shad);
}
.mc-step-num {
  font-family: var(--font-h); font-weight:700; font-size:1.5rem;
  color: var(--accent); flex-shrink:0; line-height:1;
  min-width:2rem;
}

/* Testimonials */
.mc-quote {
  background: var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:1.75rem;
  box-shadow: var(--shad); display:flex; flex-direction:column; gap:1rem;
}
.mc-quote-mark { font-size:2.5rem; line-height:1; color: var(--accent); font-family:serif; }
.mc-quote-text { font-size:1rem; line-height:1.7; font-style:italic; color: var(--txt); }
.mc-quote-author { font-family: var(--font-h); font-size:.88rem; font-weight:600; }
.mc-quote-role { font-size:.82rem; color: var(--muted); }
.mc-tag {
  display:inline-block; background: var(--bg2); color: var(--primary);
  font-family: var(--font-h); font-size:.75rem; font-weight:600;
  padding:.2rem .65rem; border-radius:6px; letter-spacing:.02em;
}

/* Community */
.mc-community-links { display:flex; flex-wrap:wrap; gap:.75rem; margin-top:1.5rem; }
.mc-comm-link {
  display:flex; align-items:center; gap:.5rem;
  background: var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:.75rem 1.25rem;
  font-family: var(--font-h); font-size:.9rem; font-weight:500;
  color: var(--muted); text-decoration:none;
  transition: all var(--tr);
}

/* Newsletter */
.mc-newsletter-form {
  display:flex; gap:.75rem; flex-wrap:wrap;
  max-width:480px; margin-top:1.5rem;
}
.mc-input {
  flex:1; min-width:220px;
  background: var(--surface); border:1.5px solid var(--border);
  border-radius:var(--r); padding:.7rem 1rem;
  font-family: var(--font-b); font-size:var(--fz); color: var(--txt);
  transition: border-color var(--tr);
}
.mc-input:focus { outline:none; border-color: var(--primary); }
.mc-input::placeholder { color: var(--muted); }
.mc-note { font-size:.85rem; color: var(--muted); margin-top:.75rem; }
.mc-success {
  display:flex; align-items:center; gap:.75rem;
  background: var(--bg2); border:1px solid var(--accent);
  border-radius:var(--r); padding:1rem 1.25rem;
  color: var(--primary); font-family: var(--font-h); font-weight:600;
}

.mc-faq-list { display:flex; flex-direction:column; gap:.5rem; }
.mc-faq-item {
  background: var(--surface); border:1px solid var(--border);
  border-radius:var(--r); overflow:hidden;
  transition: border-color var(--tr);
}
.mc-faq-item:hover { border-color: var(--accent); }
.mc-faq-q {
  display:flex; align-items:center; justify-content:space-between;
  gap:1rem; width:100%; padding:1.1rem 1.25rem;
  background:none; border:none; cursor:pointer;
  font-family: var(--font-h); font-size:.98rem; font-weight:600;
  color: var(--txt); text-align:left;
  transition: color var(--tr);
}
.mc-faq-q:hover { color: var(--primary); }
.mc-faq-icon { flex-shrink:0; color: var(--accent); transition: transform .3s ease; }
.mc-faq-icon.open { transform: rotate(45deg); }
.mc-faq-a {
  padding:0 1.25rem 1.1rem;
  color: var(--muted); font-size:.95rem; line-height:1.7;
}

/* Footer */
.mc-footer {
  background: var(--surface); border-top:1px solid var(--border);
  padding:3rem 0 2rem;
}
.mc-footer-inner {
  max-width:1100px; margin:0 auto; padding:0 1.25rem;
}
.mc-footer-top {
  display:flex; justify-content:space-between; align-items:flex-start;
  flex-wrap:wrap; gap:2rem; margin-bottom:2rem;
}
.mc-footer-links {
  display:flex; flex-wrap:wrap; gap:.5rem 1.5rem;
  font-family: var(--font-h); font-size:.85rem;
}
.mc-footer-links a { color: var(--muted); text-decoration:none; }
.mc-footer-links a:hover { color: var(--primary); }
.mc-footer-bottom {
  border-top:1px solid var(--border); padding-top:1.25rem;
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:.75rem;
  font-size:.8rem; color: var(--muted); font-family: var(--font-h);
}

/* NeuroMindy button */
.mc-neuro-btn {
  position: fixed; bottom:1.5rem; right:1.5rem; z-index:150;
  display:flex; flex-direction:column; align-items:flex-end; gap:.35rem;
}
.mc-neuro-pill {
  display:flex; align-items:center; gap:.75rem;
  background: var(--primary); color:#fff;
  padding:.75rem 1.25rem .75rem .75rem;
  border-radius:100px; box-shadow: var(--shad-lg);
  text-decoration:none; font-family: var(--font-h);
  font-size:.9rem; font-weight:600;
  transition: all var(--tr);
  animation: pulse-border 3s ease-in-out infinite;
}
.mc-neuro-pill:hover { background: var(--pri-lt); transform:translateY(-2px); color:#fff; }
#mc-root[data-motion="true"] .mc-neuro-pill { animation:none; }
@keyframes pulse-border {
  0%,100% { box-shadow: 0 4px 24px rgba(26,82,68,.3), 0 0 0 0 rgba(82,168,130,.4); }
  50% { box-shadow: 0 4px 24px rgba(26,82,68,.3), 0 0 0 8px rgba(82,168,130,.0); }
}
.mc-neuro-avatar {
  width:36px; height:36px; border-radius:50%;
  background: rgba(255,255,255,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; flex-shrink:0;
}
.mc-neuro-ext {
  font-family: var(--font-h); font-size:.72rem; color: var(--muted);
  text-align:right; font-weight:500;
}

/* Accessibility panel */
.mc-a11y-overlay {
  position:fixed; inset:0; z-index:300;
  background: rgba(0,0,0,.45);
  backdrop-filter:blur(3px);
  transition: opacity var(--tr);
}
.mc-a11y-panel {
  position:fixed; top:0; right:0; bottom:0; z-index:301;
  width:min(360px,100vw);
  background: var(--surface); border-left:1px solid var(--border);
  box-shadow: -8px 0 32px rgba(0,0,0,.15);
  overflow-y:auto; padding:2rem 1.5rem;
  display:flex; flex-direction:column; gap:1.5rem;
}
.mc-a11y-head {
  display:flex; align-items:center; justify-content:space-between;
}
.mc-a11y-head h3 { font-size:1.1rem; }
.mc-a11y-group { display:flex; flex-direction:column; gap:.75rem; }
.mc-a11y-label {
  font-family: var(--font-h); font-size:.82rem; font-weight:600;
  color: var(--muted); text-transform:uppercase; letter-spacing:.06em;
}
.mc-seg {
  display:flex; gap:.4rem; flex-wrap:wrap;
}
.mc-seg-btn {
  font-family: var(--font-h); font-size:.85rem; font-weight:500;
  padding:.4rem .85rem; border-radius:8px; cursor:pointer;
  border:1.5px solid var(--border); background: var(--bg);
  color: var(--muted); transition: all var(--tr);
}
.mc-seg-btn.sel {
  background: var(--primary); color:#fff; border-color: var(--primary);
}
.mc-toggle {
  display:flex; align-items:center; justify-content:space-between;
  gap:1rem; padding:.75rem 1rem;
  background: var(--bg2); border-radius:var(--r); border:1px solid var(--border);
}
.mc-toggle-label { font-size:.92rem; flex:1; }
.mc-switch {
  position:relative; width:44px; height:24px; flex-shrink:0;
}
.mc-switch input { opacity:0; width:0; height:0; position:absolute; }
.mc-switch-track {
  position:absolute; inset:0; border-radius:12px;
  background: var(--border); transition: background var(--tr); cursor:pointer;
}
.mc-switch-track::after {
  content:''; position:absolute; top:3px; left:3px;
  width:18px; height:18px; border-radius:50%;
  background:#fff; transition: transform var(--tr);
}
.mc-switch input:checked + .mc-switch-track { background: var(--primary); }
.mc-switch input:checked + .mc-switch-track::after { transform:translateX(20px); }
.mc-switch input:focus-visible + .mc-switch-track { outline:3px solid var(--cta); outline-offset:2px; }

/* Search panel */
.mc-search-bar {
  position:fixed; top:76px; left:50%; transform:translateX(-50%);
  z-index:200; width:min(560px,92vw);
  background: var(--surface); border:1.5px solid var(--primary);
  border-radius:var(--r); box-shadow: var(--shad-lg);
  overflow:hidden;
}
.mc-search-input {
  width:100%; padding:.85rem 1.1rem;
  background:none; border:none;
  font-family: var(--font-b); font-size:1rem; color: var(--txt);
}
.mc-search-input:focus { outline:none; }
.mc-search-results { border-top:1px solid var(--border); }
.mc-search-result {
  width:100%; padding:.75rem 1.1rem;
  background:none; border:none; text-align:left;
  cursor:pointer; font-family: var(--font-h); font-size:.9rem;
  color: var(--txt); display:flex; align-items:center; gap:.75rem;
  transition: background var(--tr);
}
.mc-search-result:hover { background: var(--bg2); color: var(--primary); }

/* Misc */
.mc-divider { height:1px; background: var(--border); margin:1.5rem 0; }
.mc-case-card { display:flex; flex-direction:column; gap:.75rem; }
.mc-case-card h3 { font-size:1.05rem; }

@media(max-width:640px) {
  .mc-nav-links { display:none; }
  .mc-hero { padding:3rem 0; }
}

  Moon: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
  Search: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  A11y: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" aria-hidden="true"><circle cx="12" cy="5" r="1.5"/><path d="M6 8l6 2 6-2"/><path d="M12 10v5"/><path d="M9 21l3-6 3 6"/></svg>,
  X: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>,
  ExtLink: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
  Brain: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" aria-hidden="true"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.44-3.14Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.44-3.14Z"/></svg>,
  Game: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" aria-hidden="true"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13" strokeWidth="2.5"/><line x1="18" y1="11" x2="18.01" y2="11" strokeWidth="2.5"/><rect x="2" y="6" width="20" height="12" rx="4"/></svg>,
};

// ─────────────────────────────────────────────────────────────────────────────
// SWITCH COMPONENT
// ─────────────────────────────────────────────────────────────────────────────
function Toggle({ id, checked, onChange, label }) {
  return (
    <div className="mc-toggle">
      <label htmlFor={id} className="mc-toggle-label">{label}</label>
      <label className="mc-switch">
        <input type="checkbox" id={id} checked={checked} onChange={e => onChange(e.target.checked)}/>
        <span className="mc-switch-track" role="presentation"/>
      </label>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SECTION WRAPPER
// ─────────────────────────────────────────────────────────────────────────────
function Section({ id, title, sub, expanded, onToggle, t, children, sRef }) {
  return (
    <section id={id} className="mc-section" ref={sRef}>
      <div className="mc-container">
        <div className="mc-section-head">
          <div>
            <h2>{title}</h2>
            {sub && <p className="mc-section-sub">{sub}</p>}
          </div>
          <button
            className="mc-section-toggle"
            onClick={() => onToggle(id)}
            aria-expanded={expanded}
            aria-controls={`${id}-body`}
          >
            {expanded ? t("collapse") : t("expand")}
          </button>
        </div>
        <div
          id={`${id}-body`}
          className="mc-section-body"
          style={{ maxHeight: expanded ? "9999px" : "0", opacity: expanded ? 1 : 0 }}
        >
          {children}
        </div>
      </div>
    </section>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang]     = useState("en");
  const [theme, setTheme]   = useState(() =>
    typeof window !== "undefined" && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
  );
  const [a11y, setA11y]     = useState({ fz:"normal", dys:false, motion:false, calm:false });
  const [a11yOpen, setA11yOpen] = useState(false);
  const [active, setActive] = useState("home");
  const [progress, setProg] = useState(0);
  const [searchOpen, setSO] = useState(false);
  const [query, setQuery]   = useState("");
  const [email, setEmail]   = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [openFaq, setFaq]   = useState(null);
  const [expanded, setExp]  = useState({
    about:true, labs:true,
    start:false, cases:false, testimonials:false,
    community:false, newsletter:false, faq:false
  });

  const sRefs = useRef({});
  const t = k => T[lang][k] || k;

  // Apply root attributes
  useEffect(() => {
    const r = document.getElementById("mc-root");
    if (!r) return;
    r.setAttribute("data-theme", theme);
    r.setAttribute("data-fz", a11y.fz);
    a11y.dys    ? r.setAttribute("data-dys","true")    : r.removeAttribute("data-dys");
    a11y.motion ? r.setAttribute("data-motion","true") : r.removeAttribute("data-motion");
    a11y.calm   ? r.setAttribute("data-calm","true")   : r.removeAttribute("data-calm");
  }, [theme, a11y]);

  // Scroll progress + active section
  useEffect(() => {
    const onScroll = () => {
      const el = document.documentElement;
      const top = el.scrollTop || document.body.scrollTop;
      const h = el.scrollHeight - el.clientHeight;
      setProg(h > 0 ? (top / h) * 100 : 0);
    };
    window.addEventListener("scroll", onScroll, { passive:true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); }),
      { rootMargin:"-25% 0px -65% 0px" }
    );
    Object.values(sRefs.current).forEach(el => el && obs.observe(el));
    return () => obs.disconnect();
  }, []);

  const scrollTo = id => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior:"smooth", block:"start" });
    setSO(false);
  };

  const toggleExp = id => setExp(p => ({ ...p, [id]: !p[id] }));
  const setRef = id => el => { sRefs.current[id] = el; };

  const filteredSections = SECTIONS.filter(s => {
    if (!query.trim()) return true;
    const q = query.toLowerCase();
    const nk = `n_${s}`;
    return t(nk).toLowerCase().includes(q);
  });

  const navKeys = ["home","about","labs","start","cases","testimonials","community","faq"];

  return (
    <>
      <style dangerouslySetInnerHTML={{ __html: GLOBAL_CSS }}/>
      <div id="mc-root">

        {/* Skip link */}
        <a href="#home" style={{
          position:"absolute", left:"-9999px", top:"auto",
          width:"1px", height:"1px", overflow:"hidden",
          zIndex:9999
        }}
          onFocus={e => { e.target.style.left="1rem"; e.target.style.width="auto"; e.target.style.height="auto"; }}
          onBlur={e => { e.target.style.left="-9999px"; }}
        >{t("skip")}</a>

        {/* Progress bar */}
        <div
          className="mc-progress"
          style={{ width:`${progress}%` }}
          role="progressbar"
          aria-label={t("progress")}
          aria-valuenow={Math.round(progress)}
          aria-valuemin={0}
          aria-valuemax={100}
        />

        {/* ── NAV ── */}
        <header className="mc-nav" role="banner">
          <div className="mc-nav-inner">
            <a href="#home" className="mc-logo" onClick={e=>{e.preventDefault();scrollTo("home");}}>
              <Ic.Logo/> MindyCore
            </a>

            <nav className="mc-nav-links" aria-label="Main navigation">
              {navKeys.map(s => (
                <button
                  key={s}
                  className={`mc-nav-link${active===s?" active":""}`}
                  onClick={() => scrollTo(s === "home" ? "home" : s)}
                  aria-current={active===s ? "true" : undefined}
                >
                  {t(`n_${s}`)}
                </button>
              ))}
            </nav>

            <div className="mc-nav-actions">
              <button
                className="mc-icon-btn"
                onClick={() => setSO(p=>!p)}
                aria-label={t("n_search")}
                aria-expanded={searchOpen}
              ><Ic.Search/></button>

              <button
                className="mc-icon-btn"
                onClick={() => setTheme(p => p==="light"?"dark":"light")}
                aria-label={theme==="dark" ? t("a11y_light") : t("a11y_dark")}
              >
                {theme==="dark" ? <Ic.Sun/> : <Ic.Moon/>}
              </button>

              <button
                className="mc-icon-btn"
                onClick={() => setA11yOpen(true)}
                aria-label={t("n_a11y")}
                aria-haspopup="dialog"
              ><Ic.A11y/></button>

              <button
                className="mc-lang-btn"
                onClick={() => setLang(p => p==="en"?"es":"en")}
                aria-label={`Switch language to ${t("lang_alt")}`}
              >
                {t("lang_alt")}
              </button>
            </div>
          </div>
        </header>

        {/* ── SEARCH BAR ── */}
        {searchOpen && (
          <div className="mc-search-bar" role="search">
            <input
              className="mc-search-input"
              placeholder={t("search_ph")}
              value={query}
              onChange={e => setQuery(e.target.value)}
              autoFocus
              aria-label={t("n_search")}
              onKeyDown={e => { if(e.key==="Escape") { setSO(false); setQuery(""); }}}
            />
            {query.trim() && (
              <div className="mc-search-results">
                {filteredSections.map(s => (
                  <button key={s} className="mc-search-result" onClick={() => { scrollTo(s); setQuery(""); }}>
                    <Ic.Search/> {t(`n_${s}`)}
                  </button>
                ))}
                {filteredSections.length===0 && (
                  <div style={{padding:".75rem 1.1rem", color:"var(--muted)", fontSize:".9rem"}}>
                    No results
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        <main id="mc-main" className="mc-main">

          {/* ── HERO ── */}
          <section id="home" className="mc-hero" ref={setRef("home")}>
            {/* Background decoration */}
            <div className="mc-hero-deco deco" aria-hidden="true">
              <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="250" cy="250" r="240" stroke="currentColor" strokeWidth="1.5"/>
                <circle cx="250" cy="250" r="160" stroke="currentColor" strokeWidth="1.2"/>
                <circle cx="250" cy="250" r="80"  stroke="currentColor" strokeWidth="1"/>
                <circle cx="250" cy="250" r="20"  fill="currentColor"/>
                {[0,60,120,180,240,300].map((deg,i) => {
                  const r1=80, r2=240;
                  const rad = (deg*Math.PI)/180;
                  return <line key={i}
                    x1={250+r1*Math.cos(rad)} y1={250+r1*Math.sin(rad)}
                    x2={250+r2*Math.cos(rad)} y2={250+r2*Math.sin(rad)}
                    stroke="currentColor" strokeWidth=".8"/>;
                })}
              </svg>
            </div>

            <div className="mc-container">
              <div className="mc-hero-content">
                <div className="mc-hero-tag">
                  <Ic.Brain/> {t("hero_tag")}
                </div>
                <h1 className="mc-hero-title" style={{ whiteSpace:"pre-line" }}>
                  {t("hero_title")}
                </h1>
                <p className="mc-hero-sub">{t("hero_sub")}</p>
                <div className="mc-hero-ctas">
                  <button className="mc-btn-primary" onClick={() => scrollTo("about")}>
                    {t("hero_cta")}
                  </button>
                  <div>
                    <a
                      href="https://hellomindy.mindycore.com"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="mc-btn-ext"
                      aria-label={`${t("hero_mindy")} — ${t("external")}`}
                    >
                      {t("hero_mindy")} <Ic.ExtLink/>
                    </a>
                    <span className="mc-ext-badge">↗ {t("hero_mindy_note")}</span>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* ── ABOUT ── */}
          <Section id="about" title={t("about_title")} sub={t("about_sub")}
            expanded={expanded.about} onToggle={toggleExp} t={t} sRef={setRef("about")}>
            <p style={{color:"var(--muted)", marginBottom:"2rem", maxWidth:"66ch"}}>{t("about_p")}</p>
            <h3 style={{marginBottom:"1.25rem"}}>{t("about_vals")}</h3>
            <div className="mc-grid-3">
              {[
                {icon:<Ic.Search/>, t:"v1t", d:"v1"},
                {icon:<Ic.A11y/>,   t:"v2t", d:"v2"},
                {icon:<Ic.Check/>,  t:"v3t", d:"v3"},

                <div key={i} className="mc-card mc-pillar">

                  <p style={{color:"var(--muted)", fontSize:".95rem"}}>{t(v.d)}</p>

              ))}
            </div>
          </Section>

          {/* ── LABS ── */}
          <Section id="labs" title={t("labs_title")} sub={t("labs_sub")}
            expanded={expanded.labs} onToggle={toggleExp} t={t} sRef={setRef("labs")}>
            <div className="mc-grid-2">
              {/* MindyMinds */}
              <div className="mc-lab mc-lab-minds">
                <div style={{display:"flex",alignItems:"center",gap:".75rem",marginBottom:"1rem"}}>
                  <div className="mc-pillar-icon"><Ic.Brain/></div>
                  <div>
                    <h3 style={{marginBottom:"0"}}>{t("minds_title")}</h3>
                    <p style={{fontSize:".85rem",color:"var(--muted)",fontFamily:"var(--font-h)"}}>{t("minds_sub")}</p>
                  </div>
                </div>
                <p style={{color:"var(--muted)",marginBottom:"1rem"}}>{t("minds_desc")}</p>
                <ul className="mc-feature-list">
                  {["mf1","mf2","mf3"].map(k => (
                    <li key={k}><span className="mc-check"><Ic.Check/></span>{t(k)}</li>
                  ))}
                </ul>
                <div style={{marginTop:"1.5rem"}}>
                  <a
                    href="https://hellomindy.mindycore.com"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="mc-btn-primary"
                    style={{display:"inline-flex",gap:".5rem"}}
                    aria-label={`${t("minds_cta")} — ${t("external")}`}
                  >
                    {t("minds_cta")} <Ic.ExtLink/>
                  </a>
                  <p style={{fontSize:".75rem",color:"var(--muted)",marginTop:".4rem",fontFamily:"var(--font-h)"}}>
                    ↗ {t("hero_mindy_note")}
                  </p>
                </div>
              </div>

              {/* MindyPlay */}
              <div className="mc-lab mc-lab-play">
                <div style={{display:"flex",alignItems:"center",gap:".75rem",marginBottom:"1rem"}}>
                  <div className="mc-pillar-icon" style={{color:"var(--cta)"}}><Ic.Game/></div>
                  <div>
                    <h3 style={{marginBottom:"0"}}>{t("play_title")}</h3>
                    <p style={{fontSize:".85rem",color:"var(--muted)",fontFamily:"var(--font-h)"}}>{t("play_sub")}</p>
                  </div>
                </div>
                <span className="mc-coming-badge">{t("play_badge")}</span>
                <p style={{color:"var(--muted)",marginBottom:"1rem"}}>{t("play_desc")}</p>
                <ul className="mc-feature-list">
                  {["pf1","pf2","pf3"].map(k => (
                    <li key={k}><span className="mc-check" style={{color:"var(--cta)"}}><Ic.Check/></span>{t(k)}</li>
                  ))}
                </ul>
                <div style={{
                  marginTop:"1.5rem", padding:"1rem",
                  background:"var(--bg2)", borderRadius:"var(--r)",
                  border:"1px dashed var(--border)",

                  fontFamily:"var(--font-h)"

          <Section id="start" title={t("start_title")} sub={t("start_sub")}

            <div className="mc-steps">

                {n:"02", tk:"s2t", dk:"s2"},

            <div className="mc-grid-3">

                {tt:"c2t", tag:"c2tag", d:"c2"},

              ].map((c,i) => (
                <div key={i} className="mc-card mc-case-card">
                  <span className="mc-tag">{t(c.tag)}</span>
                  <h3>{t(c.tt)}</h3>
                  <p style={{color:"var(--muted)",fontSize:".95rem"}}>{t(c.d)}</p>

                    style={{fontSize:".88rem",fontFamily:"var(--font-h)",fontWeight:600,color:"var(--muted)",textDecoration:"none"}}>

                  </a>
                </div>
              ))}

          </Section>

          {/* ── TESTIMONIALS ── */}
          <Section id="testimonials" title={t("testi_title")} sub={t("testi_sub")}

            <div className="mc-grid-3">
              {[
                {q:"q1",n:"q1n",r:"q1r"},

                      className="mc-faq-q"
                      onClick={() => setFaq(open ? null : i)}
                      aria-expanded={open}
                      aria-controls={`faq-a-${i}`}
                      id={`faq-q-${i}`}
                    >
                      {t(f.q)}
                      <span className={`mc-faq-icon${open?" open":""}`}><Ic.Plus/></span>
                    </button>
                    <div
                      id={`faq-a-${i}`}
                      role="region"
                      aria-labelledby={`faq-q-${i}`}
                      style={{
                        maxHeight: open ? "400px" : "0",
                        overflow:"hidden",
                        transition:"max-height .35s ease, opacity .3s ease",
                        opacity: open ? 1 : 0,
                      }}
                    >
                      <p className="mc-faq-a">{t(f.a)}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          </Section>

        </main>

        {/* ── FOOTER ── */}
        <footer className="mc-footer" role="contentinfo">
          <div className="mc-footer-inner">
            <div className="mc-footer-top">
              <div>
                <div className="mc-logo" style={{marginBottom:".5rem",textDecoration:"none",display:"flex"}}>
                  <Ic.Logo/> <span style={{marginLeft:".5rem"}}>MindyCore</span>
                </div>
                <p style={{color:"var(--muted)",fontSize:".9rem",maxWidth:"36ch"}}>{t("ft_tag")}</p>
              </div>
              <nav className="mc-footer-links" aria-label="Footer navigation">
                {navKeys.slice(1).map(s => (
                  <button key={s} onClick={() => scrollTo(s)}
                    style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",
                      fontFamily:"var(--font-h)",fontSize:".85rem"}}
                    onMouseEnter={e=>e.target.style.color="var(--primary)"}
                    onMouseLeave={e=>e.target.style.color="var(--muted)"}
                  >
                    {t(`n_${s}`)}
                  </button>
                ))}
              </nav>
            </div>
            <div className="mc-footer-bottom">
              <span>{t("ft_copy")}</span>
              <div style={{display:"flex",gap:"1.25rem",flexWrap:"wrap"}}>
                {["ft_privacy","ft_terms","ft_contact"].map(k => (
                  <a key={k} href="#" onClick={e=>e.preventDefault()}
                    style={{color:"var(--muted)",textDecoration:"none",fontFamily:"var(--font-h)"}}
                    onMouseEnter={e=>e.target.style.color="var(--primary)"}
                    onMouseLeave={e=>e.target.style.color="var(--muted)"}
                  >
                    {t(k)}
                  </a>
                ))}
              </div>
            </div>
          </div>
        </footer>

        {/* ── NEUROMINDY FLOATING BUTTON ── */}
        <div className="mc-neuro-btn" role="complementary" aria-label="NeuroMindy quick access">
          <a
            href="https://hellomindy.mindycore.com"
            target="_blank"
            rel="noopener noreferrer"
            className="mc-neuro-pill"
            aria-label={`${t("neuro_btn")} — ${t("external")}`}
          >
            <span className="mc-neuro-avatar" aria-hidden="true">🧠</span>
            {t("neuro_btn")} <Ic.ExtLink/>
          </a>
          <span className="mc-neuro-ext" aria-hidden="true">↗ {t("neuro_ext").split("—")[0].trim()}</span>
        </div>

        {/* ── ACCESSIBILITY PANEL ── */}
        {a11yOpen && (
          <>
            <div
              className="mc-a11y-overlay"
              onClick={() => setA11yOpen(false)}
              aria-hidden="true"
            />
            <div
              className="mc-a11y-panel"
              role="dialog"
              aria-modal="true"
              aria-label={t("a11y_title")}
            >
              <div className="mc-a11y-head">
                <h3>{t("a11y_title")}</h3>
                <button className="mc-icon-btn" onClick={() => setA11yOpen(false)} aria-label={t("close")}>
                  <Ic.X/>
                </button>
              </div>

              {/* Font size */}
              <div className="mc-a11y-group">
                <div className="mc-a11y-label">{t("a11y_fz")}</div>
                <div className="mc-seg" role="group" aria-label={t("a11y_fz")}>
                  {[["normal","a11y_normal"],["large","a11y_large"],["xlarge","a11y_xl"]].map(([v,lk]) => (
                    <button
                      key={v}
                      className={`mc-seg-btn${a11y.fz===v?" sel":""}`}
                      onClick={() => setA11y(p=>({...p,fz:v}))}
                      aria-pressed={a11y.fz===v}
                    >
                      {t(lk)}
                    </button>
                  ))}
                </div>
              </div>

              {/* Theme */}
              <div className="mc-a11y-group">
                <div className="mc-a11y-label">{t("a11y_theme")}</div>
                <div className="mc-seg" role="group" aria-label={t("a11y_theme")}>
                  {[["light","a11y_light"],["dark","a11y_dark"]].map(([v,lk]) => (
                    <button
                      key={v}
                      className={`mc-seg-btn${theme===v?" sel":""}`}
                      onClick={() => setTheme(v)}
                      aria-pressed={theme===v}
                    >
                      {v==="light" ? <Ic.Sun/> : <Ic.Moon/>} {t(lk)}
                    </button>
                  ))}
                </div>
              </div>

              {/* Toggles */}
              <div className="mc-a11y-group">
                <Toggle id="dys-toggle" checked={a11y.dys}
                  onChange={v => setA11y(p=>({...p,dys:v}))} label={t("a11y_dys")}/>
                <Toggle id="motion-toggle" checked={a11y.motion}
                  onChange={v => setA11y(p=>({...p,motion:v}))} label={t("a11y_motion")}/>
                <Toggle id="calm-toggle" checked={a11y.calm}
                  onChange={v => setA11y(p=>({...p,calm:v}))} label={t("a11y_calm")}/>
              </div>

              {/* Info */}
              <p style={{fontSize:".82rem",color:"var(--muted)",lineHeight:1.6,marginTop:"auto",paddingTop:"1rem",borderTop:"1px solid var(--border)"}}>
                {lang==="en"
                  ? "Your preferences are applied instantly. They reset when you close or refresh the page."
                  : "Tus preferencias se aplican al instante. Se reinician al cerrar o actualizar la página."}
              </p>
            </div>
          </>
        )}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
